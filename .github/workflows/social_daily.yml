name: Social Daily Preview

on:
  schedule:
    - cron: '0 6 * * *'   # Every day 6:00 UTC = 8:00 Italian time
  workflow_dispatch:

jobs:
  social-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run social daily
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:            ${{ secrets.RESEND_FROM }}
          SITE_URL:               ${{ secrets.SITE_URL }}
          NOTION_TOKEN:           ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:     ${{ secrets.NOTION_DATABASE_ID }}
          SOCIAL_APPROVE_SECRET:  ${{ secrets.SOCIAL_APPROVE_SECRET }}
          FB_PAGE_TOKEN:          ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:             ${{ secrets.FB_PAGE_ID }}
          IG_ACCOUNT_ID:          ${{ secrets.IG_ACCOUNT_ID }}
        run: python social_daily.py
