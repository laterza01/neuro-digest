name: NeuroDigest — Weekly Send

on:
  schedule:
    # Fires every 30 minutes on Monday AND Tuesday UTC.
    # Why Tuesday? Subscribers at UTC-10 / UTC-11 / UTC-12 experience
    # their Monday 14:30 as late as 02:30 UTC Tuesday.
    # The Python code checks each subscriber's local time independently
    # and skips anyone who isn't in their Monday 14:xx window.
    # sends_log deduplication ensures each subscriber gets exactly one email.
    - cron: '0,30 * * * 1,2'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:          ${{ secrets.RESEND_FROM }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          SITE_URL:             ${{ secrets.SITE_URL }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          MAILCHIMP_API_KEY:    ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID:    ${{ secrets.MAILCHIMP_LIST_ID }}
          MAILCHIMP_DC:         us14
        run: python digest.py
