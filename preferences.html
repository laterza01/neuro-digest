<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Topic Preferences — NeuroDigest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a1a2e;
      --red:  #c0392b;
      --body: #444;
      --light: #f7f7f5;
      --serif: Georgia, 'Times New Roman', serif;
      --sans:  -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      font-family: var(--sans);
      color: var(--body);
      background: var(--light);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .header-logo {
      font-family: var(--serif);
      font-size: 20px; font-weight: 700;
      color: #fff; text-decoration: none;
    }
    .header-tag {
      font-size: 11px; color: #8899bb;
      font-family: var(--sans); letter-spacing: .3px;
    }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .page-title {
      font-family: var(--serif);
      font-size: 26px; font-weight: 700;
      color: var(--navy); margin-bottom: 8px;
    }
    .page-sub {
      font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 36px;
    }

    /* ── EMAIL BADGE ── */
    #email-badge {
      display: inline-block;
      background: #fff; border: 1px solid #e0e0da;
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 13px; color: #666;
      margin-bottom: 32px;
    }
    #email-badge strong { color: var(--navy); }

    /* ── TOPICS GRID ── */
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 36px;
    }

    .topic-card {
      padding: 16px 14px;
      border: 2px solid #e0e0da;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color .12s, background .12s, color .12s;
      user-select: none;
      background: #fff;
      position: relative;
    }
    .topic-card:hover {
      border-color: var(--navy);
    }
    .topic-card.selected {
      border-color: var(--navy);
      background: var(--navy);
    }
    .topic-card-name {
      font-family: var(--serif);
      font-size: 14px; font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }
    .topic-card.selected .topic-card-name {
      color: #fff;
    }
    .topic-card-check {
      position: absolute; top: 10px; right: 10px;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: #fff;
      transition: background .12s, border-color .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .topic-card.selected .topic-card-check {
      border-color: var(--red);
      background: var(--red);
    }
    .topic-card-check::after {
      content: '';
      display: none;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .topic-card.selected .topic-card-check::after { display: block; }

    /* ── SELECT ALL ── */
    .select-all-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .select-all-btn {
      font-size: 12px; color: var(--red); background: none;
      border: none; cursor: pointer; padding: 0;
      font-family: var(--sans); letter-spacing: .2px;
      text-decoration: underline;
    }
    .selected-count {
      font-size: 12px; color: #999;
    }

    /* ── SAVE BUTTON ── */
    #save-btn {
      display: block;
      background: var(--red); color: #fff;
      border: none; cursor: pointer;
      padding: 14px 36px;
      font-size: 14px; font-weight: 600;
      font-family: var(--sans); letter-spacing: .3px;
      border-radius: 3px;
      transition: background .15s;
      min-width: 180px;
    }
    #save-btn:hover { background: #a93226; }
    #save-btn:disabled { background: #ccc; cursor: default; }

    /* ── STATUS MESSAGES ── */
    #status-msg {
      margin-top: 16px;
      font-size: 14px; line-height: 1.5;
      display: none;
    }
    #status-msg.success { color: #1a6632; }
    #status-msg.error   { color: var(--red); }

    /* ── LOADING STATE ── */
    #loading {
      text-align: center; padding: 60px 0;
      font-size: 14px; color: #999;
    }
    #content { display: none; }

    /* ── FOOTER ── */
    .pref-footer {
      margin-top: 48px; padding-top: 24px;
      border-top: 1px solid #e0e0da;
      font-size: 12px; color: #aaa;
      font-family: var(--sans);
    }
    .pref-footer a { color: var(--red); text-decoration: none; }

    @media (max-width: 480px) {
      .topics-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <a class="header-logo" href="/">NeuroDigest</a>
    <span class="header-tag">Topic Preferences</span>
  </header>

  <main>
    <div id="loading">Loading your preferences…</div>

    <div id="content">
      <h1 class="page-title">Choose your topics</h1>
      <p class="page-sub">
        Select the clinical areas you want included in your weekly digest.
        Your edition will only contain sections from the topics you select.
      </p>

      <div id="email-badge">Preferences for <strong id="email-display"></strong></div>

      <div class="select-all-row">
        <button class="select-all-btn" id="select-all-btn">Select all</button>
        <span class="selected-count"><span id="selected-count">0</span> selected</span>
      </div>

      <div class="topics-grid" id="topics-grid"></div>

      <button id="save-btn">Save preferences</button>
      <p id="status-msg"></p>

      <div class="pref-footer">
        NeuroDigest · <a href="/api/unsubscribe" id="unsub-link">Unsubscribe</a>
      </div>
    </div>
  </main>

  <script>
    const ALL_TOPICS = [
      "Multiple Sclerosis", "Stroke", "Parkinson's Disease", "Epilepsy",
      "Dementia", "Headache", "Neuromuscular", "Neuro-oncology",
      "Neuroinflammation", "Movement Disorders", "Neurocritical Care", "Neurogenetics",
    ];

    const params   = new URLSearchParams(location.search);
    const token    = params.get('token') || '';
    let selected   = new Set(ALL_TOPICS);

    async function init() {
      if (!token) {
        document.getElementById('loading').textContent =
          'No token found. Use the link from your email.';
        return;
      }

      try {
        const r    = await fetch(`/api/preferences?token=${encodeURIComponent(token)}`);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to load');

        document.getElementById('email-display').textContent = data.email;
        selected = new Set(data.topics || ALL_TOPICS);

        // Update unsubscribe link with token
        document.getElementById('unsub-link').href =
          `/api/unsubscribe?token=${encodeURIComponent(token)}`;

        renderGrid();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        document.getElementById('loading').textContent =
          'This link has expired or is invalid. Use the link from your latest email.';
      }
    }

    function renderGrid() {
      const grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      ALL_TOPICS.forEach(topic => {
        const card = document.createElement('div');
        card.className = 'topic-card' + (selected.has(topic) ? ' selected' : '');
        card.innerHTML = `
          <div class="topic-card-name">${topic}</div>
          <div class="topic-card-check"></div>
        `;
        card.addEventListener('click', () => toggleTopic(topic, card));
        grid.appendChild(card);
      });
      updateCount();
    }

    function toggleTopic(topic, card) {
      if (selected.has(topic)) {
        if (selected.size === 1) return; // keep at least one
        selected.delete(topic);
        card.classList.remove('selected');
      } else {
        selected.add(topic);
        card.classList.add('selected');
      }
      updateCount();
    }

    function updateCount() {
      document.getElementById('selected-count').textContent = selected.size;
      const allSelected = selected.size === ALL_TOPICS.length;
      document.getElementById('select-all-btn').textContent =
        allSelected ? 'Deselect all' : 'Select all';
    }

    document.getElementById('select-all-btn').addEventListener('click', () => {
      if (selected.size === ALL_TOPICS.length) {
        // Keep the first one selected minimum
        selected = new Set([ALL_TOPICS[0]]);
      } else {
        selected = new Set(ALL_TOPICS);
      }
      renderGrid();
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-btn');
      const msg = document.getElementById('status-msg');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      msg.style.display = 'none';

      try {
        const r = await fetch(`/api/preferences?token=${encodeURIComponent(token)}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ topics: [...selected] }),
        });
        const data = await r.json();

        if (r.ok) {
          msg.textContent  = '✓ Preferences saved. Your next digest will reflect these topics.';
          msg.className    = 'success';
        } else {
          msg.textContent = data.error || 'Something went wrong. Try again.';
          msg.className   = 'error';
        }
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        msg.className   = 'error';
      }

      msg.style.display = 'block';
      btn.disabled      = false;
      btn.textContent   = 'Save preferences';
    });

    init();
  </script>
</body>
</html>
